<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #020c1b;
            color: #ccd6f6;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #a8d8ff;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.1; }
            to { opacity: 0.9; }
        }
        .container {
            position: relative;
            z-index: 1;
        }
        .error-code {
            font-size: 150px;
            font-weight: bold;
            color: #1e90ff;
            text-shadow: 0 0 20px #1e90ff, 0 0 60px #1e90ff;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 10px;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #1e90ff; }
            to { text-shadow: 0 0 40px #1e90ff, 0 0 80px #1e90ff; }
        }
        .line {
            width: 200px;
            height: 2px;
            background: linear-gradient(to right, transparent, #1e90ff, transparent);
            margin: 10px auto 30px auto;
        }
        .message {
            font-size: 28px;
            color: #a8d8ff;
            margin: 10px 0;
            font-style: italic;
            letter-spacing: 2px;
        }
        .submessage {
            font-size: 15px;
            color: #4a7fa5;
            margin: 15px 0 35px 0;
            line-height: 1.8;
        }
        .home-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 2px solid #1e90ff;
            color: #1e90ff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            transition: all 0.3s;
            background: transparent;
        }
        .home-btn:hover {
            background: #1e90ff;
            color: #020c1b;
        }
        .grid {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, transparent, #020c1b);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="error-code">404</div>
        <div class="line"></div>
        <div class="message">Ceci n'est pas une page</div>
        <div class="submessage">
            The page you are looking for does not exist.<br>
            It may have been moved or permanently deleted.
        </div>
        <a href="/" class="home-btn">RETURN HOME</a>
    </div>
    <div class="grid"></div>
    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 2.5 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 3 + 1) + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
